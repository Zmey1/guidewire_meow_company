name: Seed Demo Data

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type SEED_PRODUCTION_DEMO_DATA to continue
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  seed-demo:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "SEED_PRODUCTION_DEMO_DATA" ]; then
            echo "Confirmation text did not match."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run production seed
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'shiftsure-a34e9' }}
        run: |
          cd backend
          npm run seed
