name: ShiftSure CI — Conflicts & Fraud Detection

on:
  push:
    branches: [ "ci-testing", "main" ]
  pull_request:
    branches: [ "main" ]

# ── Concurrency: cancel in-flight runs on the same branch ─────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Detect which parts of the repo changed ──────────────────────────────
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-tests.yml'
            ai:
              - 'ai/**'
              - '.github/workflows/ci-tests.yml'

  # ── 2. Unit tests — Conflicts & Fraud Detection (no live services needed) ──
  unit-tests:
    name: Unit Tests (Conflicts + Fraud Detection)
    needs: changes
    # Always run on PRs to main, or when backend/ai code changes
    if: |
      github.event_name == 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run conflict tests
        run: npm run test:unit -- --testPathPattern=conflicts --verbose
        working-directory: backend

      - name: Run fraud detection tests
        run: npm run test:unit -- --testPathPattern=fraud_detection --verbose
        working-directory: backend

      - name: Run all unit tests (combined report)
        run: npm run test:unit -- --reporters=default --reporters=jest-junit
        working-directory: backend
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-reports
          JEST_JUNIT_OUTPUT_NAME: unit-results.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/test-reports/unit-results.xml
          retention-days: 14

  # ── 3. AI service unit tests (Python — fraud logic) ──────────────────────
  ai-unit-tests:
    name: AI Fraud Logic Tests (Python)
    needs: changes
    if: |
      github.event_name == 'pull_request' ||
      needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt

      - name: Install AI dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx
        working-directory: ai

      - name: Run AI fraud decision matrix tests
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junitxml=test-reports/ai-results.xml \
            2>&1 || echo "No AI Python tests found yet — skipping"
        working-directory: ai

  # ── 4. E2E Tests — Full pipeline (Conflicts + Fraud Detection) ───────────
  e2e-tests:
    name: E2E Pipeline Tests (Live Firebase + AI)
    needs: [ unit-tests ]
    # Only run on push to ci-testing/main or on PRs — requires live secrets
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ai == 'true' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt

      - name: Install AI service dependencies
        run: pip install -r requirements.txt
        working-directory: ai

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Write Firebase service account credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > backend/serviceAccountKey.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/backend/serviceAccountKey.json" >> $GITHUB_ENV

      - name: Start AI service (background)
        run: |
          cd ai
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          echo "AI_PID=$!" >> $GITHUB_ENV
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}

      - name: Start backend (background)
        run: |
          cd backend
          node server.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          PORT: 3000
          AI_SERVICE_URL: http://localhost:8001

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend (port 3000)..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && echo "Backend is up" && break
            echo "  attempt $i/30..."
            sleep 2
          done

          echo "Waiting for AI service (port 8001)..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && echo "AI service is up" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run Conflict E2E tests
        run: npm run test:e2e -- --testPathPattern=conflicts_e2e --verbose
        working-directory: backend
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          PORT: 3000
          AI_SERVICE_URL: http://localhost:8001
        continue-on-error: true

      - name: Run Fraud Detection E2E tests
        run: npm run test:e2e -- --testPathPattern=fraud_e2e --verbose
        working-directory: backend
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          PORT: 3000
          AI_SERVICE_URL: http://localhost:8001
        continue-on-error: true

      - name: Run full pipeline E2E tests
        run: npm run test:e2e -- --testPathPattern=pipeline.live --verbose --reporters=default --reporters=jest-junit
        working-directory: backend
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          PORT: 3000
          AI_SERVICE_URL: http://localhost:8001
          JEST_JUNIT_OUTPUT_DIR: ./test-reports
          JEST_JUNIT_OUTPUT_NAME: e2e-results.xml

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: backend/test-reports/e2e-results.xml
          retention-days: 14

      - name: Stop background services
        if: always()
        run: |
          [ -n "$AI_PID" ] && kill $AI_PID 2>/dev/null || true
          [ -n "$BACKEND_PID" ] && kill $BACKEND_PID 2>/dev/null || true

  # ── 5. Summary gate — all required tests passed ───────────────────────────
  ci-gate:
    name: CI Gate (Required)
    needs: [ unit-tests, ai-unit-tests ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check unit test results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" && "${{ needs.unit-tests.result }}" != "skipped" ]]; then
            echo "❌ Unit tests failed (conflicts + fraud detection)"
            exit 1
          fi
          echo "✅ All required unit tests passed"

      - name: Summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Unit Tests | ${{ needs.ai-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
